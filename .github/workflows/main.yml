name: Google Job Tracker
on:
  schedule:
    - cron: '0 10 * * *' # Runs daily
  workflow_dispatch:

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install python-jobspy requests pyyaml pandas
          echo "::add-mask::${{ secrets.TELEGRAM_TOKEN }}"

      - name: Run Tracker
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONUNBUFFERED: "1"
        run: |
          # The script runs, but we don't echo sensitive data
          python tracker.py
